<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Nutrição - SGAV</title>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=2" />
  <link rel="stylesheet" href="css/funcionario.css" />
  <link rel="stylesheet" href="css/sidebar-padrao.css?v=20260708-3" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    .nutri-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .nutri-grid.resident-selected {
      grid-template-columns: minmax(0, 1fr);
    }

    .nutri-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .nutri-panel-heading,
    .nutri-history-heading {
      padding: 0 0 18px;
      border-bottom: none;
    }

    .nutri-history-heading {
      padding-bottom: 14px;
    }

    .nutri-estimativa-fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .nutri-imc-preview {
      padding: 14px 16px;
      border: 1px solid #bae6fd;
      border-radius: 14px;
      background: #f0f9ff;
      color: #075985;
      font-weight: 800;
    }

    .nutri-card {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .06);
      overflow: hidden;
    }

    .nutri-card__header {
      padding: 22px 24px;
      border-bottom: 1px solid #e8eef8;
    }

    .nutri-card__header h3 {
      color: #0f3f8f;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .nutri-card__header p {
      color: #64748b;
      font-size: 14px;
    }

    .morador-nutri-lista {
      display: flex;
      flex-direction: column;
      max-height: 660px;
      overflow-y: auto;
      padding: 10px;
    }

    .morador-nutri-item {
      border: 1px solid transparent;
      background: transparent;
      border-radius: 16px;
      padding: 14px;
      text-align: left;
      cursor: pointer;
      color: #172033;
      transition: .2s ease;
    }

    .morador-nutri-item:hover,
    .morador-nutri-item.active {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .morador-nutri-item strong {
      display: block;
      font-size: 15px;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .morador-nutri-item span {
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .nutri-panel {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .nutri-resumo {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .nutri-metric {
      border: 1px solid #dbeafe;
      border-left: 5px solid #004aad;
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(135deg, #fff, #f8fbff);
    }

    .nutri-metric span {
      display: block;
      color: #64748b;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .nutri-metric strong {
      color: #0f3f8f;
      font-size: 24px;
    }

    .nutri-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .nutri-form-grid .full {
      grid-column: 1 / -1;
    }

    .nutri-field label {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .nutri-field input,
    .nutri-field select,
    .nutri-field textarea {
      width: 100%;
      border: 1px solid #d7e3f5;
      background: #f8fbff;
      border-radius: 14px;
      padding: 14px 16px;
      color: #172033;
      font: inherit;
      outline: none;
    }

    .nutri-field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .nutri-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nutri-secondary {
      border: 1px solid #bfdbfe;
      background: #fff;
      color: #004aad;
      border-radius: 14px;
      padding: 13px 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .nutri-record-actions,
    .nutri-history-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .nutri-icon-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      background: #eff6ff;
      color: #004aad;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .nutri-icon-action:hover {
      transform: translateY(-2px);
      border-color: #93c5fd;
      background: #dbeafe;
    }

    .nutri-icon-action.danger {
      border-color: #fecaca;
      background: #fff1f2;
      color: #dc2626;
    }

    .nutri-icon-action.danger:hover {
      border-color: #fca5a5;
      background: #ffe4e6;
    }

    .nutri-form-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 4px;
    }

    .nutri-form-heading h3 {
      color: #0f3f8f;
      font-size: 20px;
      margin-bottom: 5px;
    }

    .nutri-form-heading p,
    .nutri-measures,
    .nutri-observations {
      color: #64748b;
      font-size: 13px;
    }

    .nutri-measures,
    .nutri-observations {
      margin-top: 9px;
    }

    .nutri-secondary:hover {
      border-color: #93c5fd;
      background: #eff6ff;
      transform: translateY(-1px);
    }

    .nutri-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      padding: 13px 22px;
      border: 0;
      border-radius: 12px;
      background: #004aad;
      color: #fff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 74, 173, .2);
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .nutri-primary:hover {
      background: #003b8b;
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(0, 74, 173, .26);
    }

    .nutri-search {
      position: relative;
      margin-top: 14px;
    }

    .nutri-search .material-symbols-outlined {
      position: absolute;
      top: 50%;
      left: 14px;
      color: #7186a3;
      font-size: 21px;
      pointer-events: none;
      transform: translateY(-50%);
    }

    .nutri-search input {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px 12px 44px;
      border: 1px solid #d7e3f5;
      border-radius: 12px;
      outline: none;
      background: #f8fbff;
      color: #172033;
      font: inherit;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .nutri-search input:focus {
      border-color: #60a5fa;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, .16);
    }

    .nutri-history {
      display: grid;
      gap: 12px;
    }

    .nutri-history-item {
      border: 1px solid #e1e9f5;
      border-radius: 16px;
      padding: 16px;
      background: #fff;
    }

    .nutri-history-item header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .nutri-history-item header > div:first-child {
      display: grid;
      gap: 3px;
    }

    .nutri-history-item header > div:first-child strong {
      color: #172033;
      font-size: 14px;
    }

    .nutri-empty {
      padding: 28px;
      border: 1px dashed #bfdbfe;
      border-radius: 18px;
      background: #f8fbff;
      color: #64748b;
      text-align: center;
      font-weight: 700;
    }

    .popup-msg {
      position: fixed;
      right: 24px;
      top: 88px;
      z-index: 999;
      display: none;
      padding: 16px 20px;
      border-radius: 14px;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 16px 36px rgba(15, 23, 42, .18);
    }

    .popup-msg.show { display: block; }
    .popup-msg.success { background: #0f9f6e; }
    .popup-msg.error { background: #c91c1c; }

    .nutri-confirm-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(15, 23, 42, .48);
      backdrop-filter: blur(3px);
    }

    .nutri-confirm-overlay.show {
      display: grid;
    }

    .nutri-confirm-card {
      width: min(460px, 100%);
      padding: 26px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .25);
    }

    .nutri-confirm-icon {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      border-radius: 14px;
      background: #fff1f2;
      color: #dc2626;
    }

    .nutri-confirm-card h3 {
      color: #0f3f8f;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .nutri-confirm-card p {
      color: #64748b;
      line-height: 1.55;
    }

    .nutri-confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .nutri-danger-button {
      min-height: 46px;
      padding: 12px 19px;
      border: 0;
      border-radius: 12px;
      background: #dc2626;
      color: #fff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    @media (max-width: 1100px) {
      .nutri-grid,
      .nutri-form-grid,
      .nutri-resumo,
      .nutri-estimativa-fields {
        grid-template-columns: 1fr;
      }

      .nutri-title-row,
      .nutri-form-heading {
        align-items: stretch;
        flex-direction: column;
      }

      .nutri-record-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body class="sidebar-collapsible-demo" onload="inicializarNutricao()">
  <div class="page">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-main">
          <img src="assets/logo.png" alt="Logo Asilo Vicentino" />
          <h1>SGAV</h1>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="nutricionista.html" class="sidebar-link active">
          <span class="material-symbols-outlined">monitor_heart</span>
          <span>Painel</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="login.html" class="sidebar-link logout">
          <span class="material-symbols-outlined">logout</span>
          <span>Sair</span>
        </a>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="topbar-left"></div>
        <div class="topbar-right">
          <div class="profile-chip">
            <div class="profile-text">
              <p id="perfilNome">Usuário</p>
              <span id="perfilCargo">Nutricionista</span>
            </div>
            <img class="profile-avatar" src="assets/avatar-helena.webp" alt="Perfil" />
          </div>
        </div>
      </header>

      <div class="content">
        <div class="content-wrap">
          <section class="nutri-grid">
            <article id="seletorMoradorNutri" class="nutri-card">
              <div class="nutri-card__header">
                <h3>Moradores ativos</h3>
                <p>Selecione um morador para criar ou acompanhar o prontuário.</p>
                <div class="nutri-search">
                  <span class="material-symbols-outlined">search</span>
                  <input id="buscaMoradorNutri" type="search" placeholder="Buscar morador pelo nome" aria-label="Buscar morador pelo nome" />
                </div>
              </div>
              <div id="listaMoradoresNutri" class="morador-nutri-lista"></div>
            </article>

            <article class="nutri-card">
              <div id="painelNutricional" class="nutri-panel">
                <div class="nutri-empty">Selecione um morador para iniciar.</div>
              </div>
            </article>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div id="mensagem-feedback" class="popup-msg"></div>
  <div id="confirmacaoNutri" class="nutri-confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="tituloConfirmacaoNutri">
    <div class="nutri-confirm-card">
      <div class="nutri-confirm-icon"><span class="material-symbols-outlined">warning</span></div>
      <h3 id="tituloConfirmacaoNutri">Confirmar exclusão</h3>
      <p id="textoConfirmacaoNutri"></p>
      <div class="nutri-confirm-actions">
        <button type="button" class="nutri-secondary" onclick="fecharConfirmacao()">Cancelar</button>
        <button type="button" class="nutri-danger-button" onclick="executarConfirmacao()">Excluir</button>
      </div>
    </div>
  </div>
  <script src="js/sidebarRecolhivel.js"></script>
  <script src="js/nutricionistaController.js"></script>
</body>
</html>
